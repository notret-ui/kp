<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>КП моб — Карточка</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="kp-slides.css">
<link rel="stylesheet" href="kp-mobile.css">
</head>
<body>
<svg style="display:none"><symbol id="flame" viewBox="0 0 32 40"><path d="M16 1c2 8 12 11 12 22 0 8-6 16-12 16S4 33 4 24c0-7 5-10 7-15 1 4 3 6 4 6 0-6-1-9 1-14z"/></symbol></svg>
<div class="stage-m"><div class="slide-m">
  <div class="mhead"><svg class="flame"><use href="#flame"/></svg><span class="mhead__logo">Печь.ру</span></div>
  <div class="mbody">
    <div class="mgr" style="margin-bottom:18px">
      <div class="mgr__who"><div class="mgr__ava"></div>
        <div><div class="mgr__role">Старший менеджер</div><div class="mgr__name">Сергей Сергеевич</div></div></div>
    </div>
    <div class="m-photo"></div>
    <div class="prod__rule"></div>
    <h2 class="prod__name" style="font-size:19px">Отопительная печь ТМФ Профессор Бутаков Студент с&nbsp;чугунной дверцей</h2>
    <div class="spec-h" style="font-size:var(--fs-md)">Характеристики</div>
    <div class="m-spec">
      <div class="r"><span class="k">Высота, мм</span><span class="v">1015</span></div>

      <div class="r"><span class="k">Ширина, мм</span><span class="v">540</span></div>
      <div class="r"><span class="k">Вес, кг</span><span class="v">112</span></div>
    </div>
    <div class="price-wrap" style="margin-top:18px">
      <div class="price" style="font-size:36px">309&nbsp;900&nbsp;<small>₽</small><span class="price-badge">−5%</span></div>
      <div class="price-old">325&nbsp;699&nbsp;₽</div>
    </div>
  </div>
  <div class="mfoot"><a href="#">Подробнее на&nbsp;Печь.ру</a><svg class="flame"><use href="#flame"/></svg></div>
</div></div>
